services:
  - type: web
    name: ueorms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: ueorms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: FRONTEND_URL
        value: https://your-app.vercel.app  # ← Update after Vercel deploy
      - key: RESEND_API_KEY
        sync: false  # ← Set your Resend API key in Render dashboard
      - key: RESEND_FROM
        value: onboarding@resend.dev  # ← Replace with a verified sender domain for production
      - key: SEED_KEY
        generateValue: true
      - key: RUN_SEED_ON_DEPLOY
        value: true
      - key: SEED_RETRY_COUNT
        value: 3
      - key: SEED_RETRY_DELAY_MS
        value: 10000
      - key: SEED_ADMIN_EMAIL
        value: bhavsarnisarg0@gmail.com

databases:
  - name: ueorms-db
    databaseName: ueorms_db
    user: ueorms_user
    plan: free
